<body>
<div id="root"></div>

<script>
const { useState, useMemo, useEffect, useRef, createElement: h } = React;
const {
  LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, ReferenceLine, Area, AreaChart
} = Recharts;

// ═══════════════════════════════════════════════════════════════
// MODELING ENGINE — All formulas are deterministic and commented
// ═══════════════════════════════════════════════════════════════

/**
 * Compute raw (unbounded) cognitive load.
 *
 * Additive stressors: meetings (×1.2), context switches (×0.8), deadline intensity (×5)
 * Subtractive factors: deep work (×1.5, restorative focus), sleep (×1.2, recovery)
 *
 * Higher meetings/switches/deadlines → higher load
 * Higher deep work/sleep → lower load
 */
function computeRawLoad({ meetingHours, contextSwitches, deadlineIntensity, deepWorkHours, sleepHours }) {
  return (meetingHours * 1.2) + (contextSwitches * 0.8) + (deadlineIntensity * 5)
       - (deepWorkHours * 1.5) - (sleepHours * 1.2);
}

// Empirical scale bounds based on realistic input extremes
const RAW_MIN = -25; // ideal: 0h meetings, 0 switches, 1 intensity, 8h deep, 9h sleep
const RAW_MAX = 75;  // worst: 12h meetings, 20 switches, 5 intensity, 0h deep, 3h sleep

/** Normalize raw load to 0–100 scale */
function normalizeTo100(raw) {
  return Math.max(0, Math.min(100, ((raw - RAW_MIN) / (RAW_MAX - RAW_MIN)) * 100));
}

/**
 * Fragmentation Index — measures how broken up the workday is.
 *
 * Base ratio: how many context switches per hour of deep work?
 * Multiplied by a meeting density weight: more meetings = denser interruption field.
 *
 * meeting_density_weight = 1 + (meeting_hours / total_work_hours)
 * fragmentation = (context_switches / max(deep_work_hours, 1)) × meeting_density_weight
 *
 * Capped at 10 for display. Values > 5 indicate severe fragmentation.
 */
function computeFragmentationIndex({ contextSwitches, deepWorkHours, meetingHours, totalWorkHours }) {
  const meetingDensityWeight = 1 + (meetingHours / Math.max(totalWorkHours, 1));
  return Math.min(10, (contextSwitches / Math.max(deepWorkHours, 1)) * meetingDensityWeight);
}

/**
 * Deep Work Ratio — fraction of working hours spent in focused, uninterrupted work.
 * = deep_work_hours / total_work_hours
 * Healthy threshold: ≥ 0.35 (35%)
 */
function computeDeepWorkRatio({ deepWorkHours, totalWorkHours }) {
  return Math.min(1, deepWorkHours / Math.max(totalWorkHours, 1));
}

/**
 * Burnout Risk Score for a given state — 0 to 100.
 *
 * Three drivers, equally weighted in thirds:
 *   - Cognitive load contribution (50%): high load → high risk
 *   - Deep work deficit (25%): low focus ratio → higher burnout
 *   - Sleep deficit (25%): below 9h baseline → increasing risk
 */
function computeBurnoutRisk({ cognitiveLoad, deepWorkRatio, sleepHours }) {
  const sleepFactor = ((9 - sleepHours) / 9) * 25;
  return Math.max(0, Math.min(100,
    (cognitiveLoad * 0.5) + ((1 - deepWorkRatio) * 25) + sleepFactor
  ));
}

/**
 * Generate 7-day burnout trend simulation.
 *
 * Today = day 7 (rightmost, uses live inputs).
 * Days 1–6 are simulated using day-of-week multipliers:
 *   - Weekdays build up stress toward Friday
 *   - Weekend shows partial recovery
 *
 * The meeting reduction parameter allows simulation mode to project
 * alternative futures with fewer meetings.
 */
function generateTrend(inputs, meetingReductionPct = 0) {
  const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  // Day-of-week stress multipliers (Mon=low buildup, Fri=peak, Weekend=recovery)
  const multipliers = [0.65, 0.75, 0.88, 0.95, 1.0, 0.70, 0.60];
  const adjMeetings = inputs.meetingHours * (1 - meetingReductionPct / 100);

  // Use a seeded pseudo-random for sleep variation (deterministic per session)
  const sleepVariants = [0.02, -0.03, 0.01, -0.02, 0.03, 0.04, 0.0];

  return days.map((day, i) => {
    const m = multipliers[i];
    const dayInputs = {
      meetingHours: adjMeetings * m,
      contextSwitches: inputs.contextSwitches * m,
      deadlineIntensity: Math.max(1, inputs.deadlineIntensity * m),
      // Deep work is inversely correlated with meeting load — lighter days allow more focus
      deepWorkHours: inputs.deepWorkHours * (1 + (1 - m) * 0.35),
      sleepHours: Math.max(4, Math.min(10, inputs.sleepHours + sleepVariants[i] * inputs.sleepHours)),
      totalWorkHours: inputs.totalWorkHours
    };
    const raw = computeRawLoad(dayInputs);
    const cogLoad = normalizeTo100(raw);
    const dwRatio = computeDeepWorkRatio(dayInputs);
    const burnout = computeBurnoutRisk({ cognitiveLoad: cogLoad, deepWorkRatio: dwRatio, sleepHours: dayInputs.sleepHours });
    return { day, burnout: Math.round(burnout), cogLoad: Math.round(cogLoad) };
  });
}

/**
 * Generate data-driven pattern insights.
 *
 * Each insight is conditionally triggered by metric thresholds.
 * No text is hardcoded — all values are computed from live inputs.
 * Insight language aims to be precise and actionable, not generic.
 */
function generateInsights({ cognitiveLoad, fragmentationIndex, deepWorkRatio, meetingHours, contextSwitches, totalWorkHours, burnoutRisk, sleepHours }) {
  const insights = [];
  const meetingPct = Math.round((meetingHours / Math.max(totalWorkHours, 1)) * 100);
  const dwPct = Math.round(deepWorkRatio * 100);

  if (meetingPct > 40) {
    const efficiencyDrop = Math.round((1 - deepWorkRatio) * 100);
    insights.push(`Meetings consume ${meetingPct}% of your working hours. At this density, your deep work efficiency is reduced by roughly ${efficiencyDrop}%. Each meeting-to-focus transition introduces 15–20 minutes of cognitive re-entry overhead.`);
  }

  if (fragmentationIndex > 3.5) {
    const fragDesc = fragmentationIndex > 6 ? "critically fragmented" : "highly fragmented";
    const recoveryTime = Math.round(contextSwitches * 17); // ~17min avg re-entry per switch
    insights.push(`Your workflow is ${fragDesc} (index: ${fragmentationIndex.toFixed(1)}×). ${contextSwitches} daily context switches generate approximately ${recoveryTime} minutes of cognitive recovery overhead — ${Math.round(recoveryTime / 60)}h of lost productive capacity.`);
  }

  if (deepWorkRatio < 0.3) {
    const needed = Math.round(totalWorkHours * 0.35);
    const deficit = Math.max(0, needed - Math.round(totalWorkHours * deepWorkRatio));
    insights.push(`Deep work ratio of ${dwPct}% falls below the sustainable threshold of 35%. To reach baseline capacity, you need ${deficit} additional hours of uninterrupted focus within your current ${totalWorkHours}h schedule.`);
  }

  if (cognitiveLoad > 68) {
    insights.push(`Cognitive load of ${Math.round(cognitiveLoad)}/100 is operating in the high-stress zone. At this level, working memory capacity is impaired — complex reasoning, long-term planning, and creative output are all significantly degraded.`);
  }

  if (sleepHours < 6.5) {
    const sleepDebt = (7.5 - sleepHours).toFixed(1);
    insights.push(`Sleep at ${sleepHours}h is ${sleepDebt}h below the cognitive performance threshold. Sleep debt compounds across days, amplifying the effect of every other stressor in this model.`);
  }

  if (burnoutRisk > 65) {
    insights.push(`7-day burnout trajectory is in the elevated zone (${Math.round(burnoutRisk)}/100). The combination of high load, low recovery, and fragmented attention creates non-linear compounding — each additional stressor has outsized impact at this baseline.`);
  }

  if (insights.length === 0) {
    insights.push(`Your cognitive profile is within sustainable operating range. Deep work ratio of ${dwPct}% supports effective knowledge output, and cognitive load of ${Math.round(cognitiveLoad)}/100 leaves adequate capacity for complex tasks. Protect your current sleep and focus patterns.`);
  }

  return insights;
}

// ═══════════════════════════════════════════════════════════════
// ANIMATED VALUE HOOK
// ═══════════════════════════════════════════════════════════════

function useAnimatedValue(target, duration = 550) {
  const [display, setDisplay] = useState(target);
  const state = useRef({ prev: target, raf: null });

  useEffect(() => {
    const start = state.current.prev;
    const diff = target - start;
    const startTime = performance.now();

    const tick = (now) => {
      const t = Math.min(1, (now - startTime) / duration);
      const ease = 1 - Math.pow(1 - t, 3); // cubic ease-out
      setDisplay(start + diff * ease);
      if (t < 1) {
        state.current.raf = requestAnimationFrame(tick);
      } else {
        state.current.prev = target;
      }
    };
    if (state.current.raf) cancelAnimationFrame(state.current.raf);
    state.current.raf = requestAnimationFrame(tick);
    return () => { if (state.current.raf) cancelAnimationFrame(state.current.raf); };
  }, [target, duration]);

  return display;
}

// ═══════════════════════════════════════════════════════════════
// UI COMPONENTS
// ═══════════════════════════════════════════════════════════════

/** Large circular cognitive load dial with animated progress arc */
function CognitiveDial({ value }) {
  const animated = useAnimatedValue(value);
  const SIZE = 204;
  const SW = 10;
  const R = (SIZE - SW) / 2;
  const CIRC = 2 * Math.PI * R;
  const progress = (animated / 100) * CIRC;

  const getColor = (v) => v < 40 ? "#34d399" : v < 65 ? "#fbbf24" : "#f87171";
  const color = getColor(animated);
  const label = animated < 40 ? "Sustainable" : animated < 65 ? "Elevated" : "Critical";

  return h("div", {
    style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 12 }
  },
    h("div", { style: { position: "relative", width: SIZE, height: SIZE } },
      // Subtle glow ring behind
      h("div", { style: {
        position: "absolute", inset: SW, borderRadius: "50%",
        background: `radial-gradient(circle, ${color}08 0%, transparent 70%)`,
        transition: "background 0.5s"
      }}),
      h("svg", { width: SIZE, height: SIZE, style: { transform: "rotate(-90deg)" } },
        // Background track
        h("circle", { cx: SIZE/2, cy: SIZE/2, r: R, fill: "none", stroke: "rgba(255,255,255,0.06)", strokeWidth: SW }),
        // Animated progress arc
        h("circle", {
          cx: SIZE/2, cy: SIZE/2, r: R,
          fill: "none", stroke: color, strokeWidth: SW,
          strokeDasharray: CIRC,
          strokeDashoffset: CIRC - progress,
          strokeLinecap: "round",
          style: {
            transition: "stroke 0.5s ease, stroke-dashoffset 0.6s cubic-bezier(0.34,1.56,0.64,1)",
            filter: `drop-shadow(0 0 10px ${color})`
          }
        })
      ),
      // Center content
      h("div", {
        style: {
          position: "absolute", inset: 0, display: "flex",
          flexDirection: "column", alignItems: "center", justifyContent: "center"
        }
      },
        h("span", {
          style: {
            fontSize: "2.8rem", fontFamily: "'DM Mono', monospace", color,
            letterSpacing: "-3px", lineHeight: 1,
            transition: "color 0.5s"
          }
        }, Math.round(animated)),
        h("span", {
          style: { fontSize: "0.62rem", color: "rgba(255,255,255,0.3)", letterSpacing: "0.14em", marginTop: 4, textTransform: "uppercase" }
        }, "/ 100")
      )
    ),
    h("div", { style: { textAlign: "center" } },
      h("div", { style: { fontSize: "0.65rem", color: "rgba(255,255,255,0.25)", letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 2 } }, "Cognitive Load"),
      h("div", { style: { fontSize: "0.8rem", color, transition: "color 0.5s" } }, label)
    )
  );
}

/** Animated horizontal meter bar */
function MeterBar({ label, value, max = 10, unit = "", color = "#818cf8", sublabel }) {
  const pct = Math.min(100, (value / max) * 100);
  const animated = useAnimatedValue(pct);
  const displayVal = typeof value === "number"
    ? (Number.isInteger(value) ? value : value.toFixed(2))
    : value;

  return h("div", { style: { marginBottom: "1.3rem" } },
    h("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 6 } },
      h("span", { style: { fontSize: "0.68rem", color: "rgba(255,255,255,0.35)", letterSpacing: "0.1em", textTransform: "uppercase" } }, label),
      h("span", { style: { fontSize: "0.72rem", fontFamily: "'DM Mono', monospace", color } }, `${displayVal}${unit}`)
    ),
    h("div", { style: { height: 4, background: "rgba(255,255,255,0.06)", borderRadius: 99, overflow: "hidden" } },
      h("div", {
        style: {
          height: "100%", width: `${animated}%`, background: color, borderRadius: 99,
          boxShadow: `0 0 8px ${color}80`,
          transition: "width 0.6s cubic-bezier(0.34,1.56,0.64,1)"
        }
      })
    ),
    sublabel && h("div", { style: { fontSize: "0.62rem", color: "rgba(255,255,255,0.2)", marginTop: 5 } }, sublabel)
  );
}

/** Step-increment number input */
function NumberInput({ label, value, min = 0, max = 24, step = 0.5, onChange, unit = "h" }) {
  return h("div", { style: { marginBottom: "1.1rem" } },
    h("label", { style: { display: "block", fontSize: "0.68rem", color: "rgba(255,255,255,0.35)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 6 } }, label),
    h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
      h("button", {
        className: "btn-step",
        onClick: () => onChange(Math.max(min, Math.round((value - step) * 10) / 10))
      }, "−"),
      h("div", {
        style: {
          flex: 1, textAlign: "center", fontFamily: "'DM Mono', monospace", fontSize: "0.95rem",
          color: "rgba(255,255,255,0.8)", background: "rgba(255,255,255,0.04)",
          border: "1px solid rgba(255,255,255,0.08)", borderRadius: 7, padding: "7px 0"
        }
      }, `${value}${unit}`),
      h("button", {
        className: "btn-step",
        onClick: () => onChange(Math.min(max, Math.round((value + step) * 10) / 10))
      }, "+")
    )
  );
}

/** Range slider input */
function SliderInput({ label, value, min = 1, max = 5, step = 1, onChange, unit = "" }) {
  const pct = ((value - min) / (max - min)) * 100;
  const gradient = `linear-gradient(to right, #6366f1 ${pct}%, rgba(255,255,255,0.08) ${pct}%)`;

  return h("div", { style: { marginBottom: "1.2rem" } },
    h("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 7 } },
      h("label", { style: { fontSize: "0.68rem", color: "rgba(255,255,255,0.35)", textTransform: "uppercase", letterSpacing: "0.1em" } }, label),
      h("span", { style: { fontSize: "0.72rem", fontFamily: "'DM Mono', monospace", color: "rgba(255,255,255,0.65)" } }, `${value}${unit}`)
    ),
    h("input", {
      type: "range", min, max, step, value,
      onChange: e => onChange(Number(e.target.value)),
      style: { background: gradient }
    })
  );
}

/** Custom recharts tooltip */
function CustomTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  return h("div", {
    style: {
      background: "rgba(7,7,15,0.96)", border: "1px solid rgba(255,255,255,0.1)",
      borderRadius: 8, padding: "8px 14px", fontSize: "0.7rem", fontFamily: "'DM Mono', monospace"
    }
  },
    h("div", { style: { color: "rgba(255,255,255,0.35)", marginBottom: 5 } }, label),
    ...payload.map(p => h("div", { key: p.dataKey, style: { color: p.color, marginBottom: 2 } }, `${p.name}: ${p.value}`))
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APPLICATION
// ═══════════════════════════════════════════════════════════════

function App() {
  // User input state
  const [meetingHours,      setMeetingHours]      = useState(4);
  const [deepWorkHours,     setDeepWorkHours]      = useState(2);
  const [contextSwitches,   setContextSwitches]    = useState(8);
  const [sleepHours,        setSleepHours]         = useState(7);
  const [deadlineIntensity, setDeadlineIntensity]  = useState(3);
  const [energyLevel,       setEnergyLevel]        = useState(3);
  const [meetingReduction,  setMeetingReduction]   = useState(20);
  const [showSim,           setShowSim]            = useState(false);

  // Total work = meetings + deep work + 2h admin/misc
  const totalWorkHours = meetingHours + deepWorkHours + 2;

  // ── Metric computation (memoized for performance) ──
  const metrics = useMemo(() => {
    const simMeetingHours = showSim
      ? meetingHours * (1 - meetingReduction / 100)
      : meetingHours;

    const inputs = { meetingHours: simMeetingHours, contextSwitches, deadlineIntensity, deepWorkHours, sleepHours, totalWorkHours };

    const raw = computeRawLoad(inputs);
    const cognitiveLoad = normalizeTo100(raw);
    const fragmentationIndex = computeFragmentationIndex(inputs);
    const deepWorkRatio = computeDeepWorkRatio(inputs);
    const burnoutRisk = computeBurnoutRisk({ cognitiveLoad, deepWorkRatio, sleepHours });
    const trendData = generateTrend(
      { meetingHours, contextSwitches, deadlineIntensity, deepWorkHours, sleepHours, totalWorkHours },
      showSim ? meetingReduction : 0
    );
    const insights = generateInsights({
      cognitiveLoad, fragmentationIndex, deepWorkRatio,
      meetingHours: simMeetingHours, contextSwitches, totalWorkHours, burnoutRisk, sleepHours
    });

    return { cognitiveLoad, fragmentationIndex, deepWorkRatio, burnoutRisk, trendData, insights };
  }, [meetingHours, deepWorkHours, contextSwitches, sleepHours, deadlineIntensity, energyLevel, meetingReduction, showSim, totalWorkHours]);

  const burnoutColor = metrics.burnoutRisk > 65 ? "#f87171" : metrics.burnoutRisk > 40 ? "#fbbf24" : "#34d399";
  const fragColor = metrics.fragmentationIndex > 5 ? "#f87171" : metrics.fragmentationIndex > 3 ? "#fbbf24" : "#34d399";

  // ── RENDER ──
  return h("div", {
    style: {
      minHeight: "100vh",
      backgroundImage: "radial-gradient(ellipse 90% 55% at 50% -5%, rgba(99,102,241,0.13) 0%, transparent 65%)"
    }
  },

    // ── NAV ──
    h("nav", {
      style: {
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "20px 40px", borderBottom: "1px solid rgba(255,255,255,0.055)",
        backdropFilter: "blur(16px)", position: "sticky", top: 0, zIndex: 100,
        background: "rgba(7,7,15,0.82)"
      }
    },
      // Logo
      h("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
        h("div", {
          style: {
            width: 26, height: 26, borderRadius: 7,
            background: "linear-gradient(135deg, #4f46e5, #818cf8)",
            display: "flex", alignItems: "center", justifyContent: "center",
            boxShadow: "0 0 16px rgba(99,102,241,0.35)"
          }
        },
          h("div", { style: { width: 8, height: 8, borderRadius: "50%", background: "rgba(255,255,255,0.9)" } })
        ),
        h("span", { style: { fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: "0.95rem", letterSpacing: "0.06em" } }, "CORTEX")
      ),
      // Nav links
      h("div", { style: { display: "flex", gap: 28, fontSize: "0.68rem", color: "rgba(255,255,255,0.28)", letterSpacing: "0.12em", textTransform: "uppercase" } },
        h("span", null, "System"),
        h("span", null, "Model"),
        h("span", null, "Insights")
      ),
